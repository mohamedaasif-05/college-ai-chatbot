<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
    position: relative;
}

/* Top Left Back Button */
.top-back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
}

.top-back-btn a {
    text-decoration: none;
}

.top-back-btn button {
    padding: 8px 18px;
    background: #ffcc00;
    color: black;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.top-back-btn button:hover {
    background: #ffaa00;
    box-shadow: 0 0 12px #ffcc00;
}

/* Header */
.header {
    padding: 60px 20px 10px;
    font-size: 34px;
    font-weight: bold;
}

.sub-header {
    font-size: 18px;
    margin-bottom: 30px;
    color: #ddd;
}

/* Section */
.section {
    padding: 40px 20px;
}

/* Placement Stats */
.stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.stat-card {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.stat-card:hover {
    transform: translateY(-10px);
}

.stat-card h2 {
    font-size: 32px;
    color: #ffcc00;
    margin: 10px 0;
}

/* Recruiters Section */
.recruiters {
    margin-top: 40px;
}

.recruiter-logos {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    margin-top: 20px;
}

.recruiter-card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 220px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.recruiter-card:hover {
    transform: scale(1.05);
}

.recruiter-card img {
    max-width: 160px;
    max-height: 80px;
}

/* Bottom Back Button */
.back-btn {
    margin: 40px 0;
}

.back-btn a {
    text-decoration: none;
}

.back-btn button {
    padding: 12px 25px;
    background: #ffcc00;
    color: black;
    font-weight: bold;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.back-btn button:hover {
    background: #ffaa00;
    box-shadow: 0 0 15px #ffcc00;
}

/* Footer */
.footer {
    padding: 20px;
    font-size: 14px;
    background: rgba(0,0,0,0.3);
    margin-top: 30px;
}

</style>
</head>
